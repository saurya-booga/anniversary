<!DOCTYPE html>
<html>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
        background-image: url('photos/landing_bg.jpeg');
        background-repeat: no-repeat; 
        background-size: cover;       
        background-attachment: fixed;  
    }
    /* Centers the entire list of recordings on the screen */
.audio-list-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  display: flex;
  flex-direction: column; /* Stacks the rectangles vertically */
  gap: 20px; /* Space between each rectangle */
}

/* The styling for each individual row */
.audio-rectangle {
  width: 450px; 
  height: 80px; 
  
  background-color: rgba(78, 62, 140, 0.85); /* Semi-transparent background */
  border: 2px solid #f8f8f8;
  border-radius: 4px;
  padding: 0 25px; 
  
  display: flex;
  flex-direction: row; /* Puts items side-by-side */
  align-items: center; /* Vertically centers the text and button */
  justify-content: space-between; /* Pushes text left and button right */
}

/* The text inside the rectangle */
.audio-text {
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  color: #f8f8f8;
}

/* The invisible button that wraps your image */
.play-btn {
  background: transparent; /* Removes default grey background */
  border: none;            /* Removes default border */
  cursor: pointer;
  outline: none;
  padding: 0;
  
  transition: transform 0.1s; /* Keeps the smooth click animation */
}

/* Hover and active effects to make the image act like a button */
.play-btn:hover {
  transform: scale(1.1); /* Slightly enlarges the icon on hover */
}

.play-btn:active {
  transform: scale(0.9); /* Squishes the icon when clicked */
}

/* Your custom pixel art play button */
.play-icon {
  width: 40px; /* Adjust based on your image size */
  height: 40px;
  image-rendering: pixelated; /* Keeps the pixel art crisp */
}
</style>

<body>
    <div class="audio-list-container">
  
        <div class="audio-rectangle">
          <span class="audio-text">Do you love me?</span>
          <button class="play-btn" onclick="document.getElementById('audio1').play()">
            <img src="photos/audio.png" alt="Play" class="play-icon">
          </button>
          <audio id="audio1" src="audio/love.mp3"></audio>
        </div>
      
        <div class="audio-rectangle">
          <span class="audio-text">Do you think I am cute?</span>
          <button class="play-btn" onclick="document.getElementById('audio2').play()">
            <img src="photos/audio.png" alt="Play" class="play-icon">
          </button>
          <audio id="audio2" src="audio/cute.mp3"></audio>
        </div>
      
        <div class="audio-rectangle">
          <span class="audio-text">You won't leave me later on right?</span>
          <button class="play-btn" onclick="document.getElementById('audio3').play()">
            <img src="photos/audio.png" alt="Play" class="play-icon">
          </button>
          <audio id="audio3" src="audio/together.mp3"></audio>
        </div>
      
        <div class="audio-rectangle">
          <span class="audio-text">Who is your boyfriend?</span>
          <button class="play-btn" onclick="document.getElementById('audio4').play()">
            <img src="photos/audio.png" alt="Play" class="play-icon">
          </button>
          <audio id="audio4" src="audio/boyfriend.mp3"></audio>
        </div>
      
      </div>
</body>

  


</html>
